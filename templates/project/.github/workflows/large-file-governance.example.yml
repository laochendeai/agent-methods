name: Large File Governance

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  large-file-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run large-file governance gate
        run: |
          python scripts/check_large_files.py
